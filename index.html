<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Plano 3D Interactivo - Infodoc Lab Final</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #1a1a1a; font-family: 'Segoe UI', Tahoma, sans-serif; }
        #info {
            position: absolute; top: 15px; width: 100%; text-align: center;
            color: #fff; pointer-events: none; z-index: 100; text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }
        h2 { margin: 0; font-weight: 400; letter-spacing: 1px; color: #4da6ff; }
        p { color: #ccc; font-size: 0.9em; margin-top: 5px; }
        
        /* Estilo del botón flotante */
        #btnMedidas {
            position: absolute; bottom: 25px; right: 25px; z-index: 100;
            padding: 12px 24px; font-size: 15px; font-weight: bold;
            background-color: #4da6ff; color: #111; border: none;
            border-radius: 6px; cursor: pointer; box-shadow: 0 4px 8px rgba(0,0,0,0.4);
            transition: background 0.3s, transform 0.1s;
        }
        #btnMedidas:hover { background-color: #3388dd; }
        #btnMedidas:active { transform: scale(0.95); }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

    <div id="info">
        <h2>LABORATORIO INFODOC - PLANO TÉCNICO</h2>
        <p>Haz clic en los cajones para abrirlos. Usa el botón inferior para ver las cotas 3D.</p>
    </div>

    <button id="btnMedidas">Ver Medidas en 3D</button>

    <script>
        // --- INICIO CÓDIGO 3D ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x1a1a1a, 0.015);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(-10, 22, 42);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.target.set(3, 3, 3);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2 + 0.1; 

        // Iluminación
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));
        const spotLight = new THREE.SpotLight(0xffffff, 1.0);
        spotLight.position.set(5, 40, 15);
        spotLight.castShadow = true;
        scene.add(spotLight);

        // --- GENERADOR DE TEXTURAS ---
        function crearTexturaEquipo(texto, bgColor, txtColor, extraText = "") {
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 256;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = bgColor; ctx.fillRect(0, 0, 512, 256);
            ctx.fillStyle = txtColor; ctx.font = 'bold 50px Arial';
            ctx.textAlign = 'center'; ctx.fillText(texto, 256, 100);
            if(extraText) {
                ctx.fillStyle = '#00ff00'; ctx.font = '70px Digital-7, monospace';
                ctx.fillText(extraText, 256, 200);
            }
            return new THREE.CanvasTexture(canvas);
        }

        // Materiales
        const matMadera = new THREE.MeshStandardMaterial({ color: 0xe0e0e0, roughness: 0.8 }); 
        const matEstructura = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.6 }); 
        const matCajones = new THREE.MeshStandardMaterial({ color: 0x444444, roughness: 0.7 });
        const matTirador = new THREE.MeshStandardMaterial({ color: 0xaaaaaa, roughness: 0.2 });
        const matTapete = new THREE.MeshStandardMaterial({ color: 0x1d3557, roughness: 0.9 }); 
        const matPC = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.5 }); 
        const matPantalla = new THREE.MeshStandardMaterial({ color: 0x000000, emissive: 0x0a2342, emissiveIntensity: 1.0 }); 

        const matSugonFront = new THREE.MeshStandardMaterial({ map: crearTexturaEquipo('SUGON D2020', '#111', '#fff', ' 350°C ') });
        const matSugonBody = new THREE.MeshStandardMaterial({ color: 0x880000 }); 
        const sugonMats = [matSugonBody, matSugonBody, matSugonBody, matSugonBody, matSugonFront, matSugonBody];

        const matAifenFront = new THREE.MeshStandardMaterial({ map: crearTexturaEquipo('AIFEN DUAL', '#111', '#fca311', 'CH1 CH2') });
        const matAifenBody = new THREE.MeshStandardMaterial({ color: 0x333333 }); 
        const aifenMats = [matAifenBody, matAifenBody, matAifenBody, matAifenBody, matAifenFront, matAifenBody];

        const matFuenteFront = new THREE.MeshStandardMaterial({ map: crearTexturaEquipo('KORAD LAB', '#111', '#4da6ff', ' 5.0V  2.0A ') });
        const matFuenteBody = new THREE.MeshStandardMaterial({ color: 0xdddddd }); 
        const fuenteMats = [matFuenteBody, matFuenteBody, matFuenteBody, matFuenteBody, matFuenteFront, matFuenteBody];

        function createBox(w, h, d, mat, x, y, z) {
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
            mesh.position.set(x, y, z);
            mesh.castShadow = true; mesh.receiveShadow = true;
            scene.add(mesh);
            return mesh;
        }

        // --- ESTRUCTURA DE LA MESA ---
        createBox(25, 0.3, 7.5, matMadera, 0, 7.5, 0); 
        createBox(7.5, 0.3, 7.5, matMadera, 8.75, 7.5, 7.5); 
        
        createBox(24.6, 0.25, 7.1, matMadera, 0, 1.7, 0); 
        createBox(6.7, 0.25, 7.1, matMadera, 8.75, 1.7, 7.45); 

        // Repisa recortada en L
        createBox(16, 0.25, 3, matMadera, 4.5, 12, -2.25); 
        createBox(3, 0.25, 12, matMadera, 11, 12, 5.25); 

        function crearMarco(y) {
            createBox(24.6, 0.4, 0.4, matEstructura, 0, y, -3.5); 
            createBox(17.5, 0.4, 0.4, matEstructura, -3.55, y, 3.5); 
            createBox(7.1, 0.4, 0.4, matEstructura, 8.75, y, 11); 
            createBox(0.4, 0.4, 7.0, matEstructura, -12.3, y, 0); 
            createBox(0.4, 0.4, 14.5, matEstructura, 12.3, y, 3.75); 
            createBox(0.4, 0.4, 7.5, matEstructura, 5.2, y, 7.25); 
        }
        crearMarco(7.15); crearMarco(1.5);

        const patasY = 4.325, patasH = 6.05;
        const patasPos = [[-12.3,-3.5],[12.3,-3.5],[-12.3,3.5],[5.2,3.5],[12.3,11],[5.2,11]];
        patasPos.forEach(p => createBox(0.4, patasH, 0.4, matEstructura, p[0], patasY, p[1]));
        
        const soportesRepisa = [
            [-3.0, -3.5], [4.5, -3.5], [12.3, -3.5], [12.3, 3.5], [12.3, 11]     
        ];
        soportesRepisa.forEach(pos => createBox(0.4, 4.5, 0.4, matEstructura, pos[0], 9.75, pos[1]));

        // --- SISTEMA INTERACTIVO DE CAJONES ---
        const cajonesInteractivos = [];
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        function crearCajonInteractivo(w, d, x, y, z, ejeApertura, direccion) {
            const grupoCajon = new THREE.Group();
            const cuerpo = new THREE.Mesh(new THREE.BoxGeometry(w, 1.0, d), matCajones);
            cuerpo.castShadow = true;
            
            let frenteW = w, frenteD = d, frenteX = 0, frenteZ = 0, tiradorX = 0, tiradorZ = 0, tiradorW=1.5, tiradorD=0.3;

            if (ejeApertura === 'z') {
                frenteW = w + 0.1; frenteD = 0.2; frenteZ = (d/2) + 0.1;
                tiradorZ = frenteZ + 0.15; tiradorW = 1.5; tiradorD = 0.3;
            } else if (ejeApertura === 'x') {
                frenteD = d + 0.1; frenteW = 0.2; frenteX = (w/2) * direccion + (0.1 * direccion);
                tiradorX = frenteX + (0.15 * direccion); tiradorW = 0.3; tiradorD = 1.5;
            }

            const frente = new THREE.Mesh(new THREE.BoxGeometry(frenteW, 1.1, frenteD), matCajones);
            frente.position.set(frenteX, 0, frenteZ);
            const tirador = new THREE.Mesh(new THREE.BoxGeometry(tiradorW, 0.15, tiradorD), matTirador);
            tirador.position.set(tiradorX, 0, tiradorZ);

            cuerpo.userData.parentDrawer = grupoCajon;
            frente.userData.parentDrawer = grupoCajon;
            tirador.userData.parentDrawer = grupoCajon;

            grupoCajon.add(cuerpo); grupoCajon.add(frente); grupoCajon.add(tirador);
            grupoCajon.position.set(x, y, z);
            scene.add(grupoCajon);

            const posCerrada = new THREE.Vector3(x, y, z);
            const posAbierta = new THREE.Vector3(x, y, z);
            if (ejeApertura === 'z') posAbierta.z += 3.5 * direccion;
            if (ejeApertura === 'x') posAbierta.x += 3.5 * direccion;

            grupoCajon.userData = { isOpen: false, posCerrada: posCerrada, posAbierta: posAbierta };
            cajonesInteractivos.push(cuerpo, frente, tirador);
            return grupoCajon;
        }

        const cajonIzq = crearCajonInteractivo(6.5, 5.0, -8.0, 6.5, 0.5, 'z', 1);
        const cajonCen = crearCajonInteractivo(6.5, 5.0, -0.5, 6.5, 0.5, 'z', 1);
        const cajonL = crearCajonInteractivo(5.0, 5.5, 7.5, 6.5, 7.5, 'x', -1);

        window.addEventListener('pointermove', (event) => {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(cajonesInteractivos);
            document.body.style.cursor = intersects.length > 0 ? 'pointer' : 'default';
        });

        window.addEventListener('click', (event) => {
            if(event.target.id === 'btnMedidas') return;
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(cajonesInteractivos);
            if (intersects.length > 0) {
                const grupoCajon = intersects[0].object.userData.parentDrawer;
                if(grupoCajon) grupoCajon.userData.isOpen = !grupoCajon.userData.isOpen;
            }
        });


        // --- EQUIPOS REALISTAS ---
        const fuente = new THREE.Mesh(new THREE.BoxGeometry(1.4, 1.8, 2.5), fuenteMats);
        fuente.position.set(0.5, 13.0, -2.25); fuente.castShadow = true; scene.add(fuente);

        const sugon = new THREE.Mesh(new THREE.BoxGeometry(1.5, 1.5, 2.0), sugonMats);
        sugon.position.set(6.0, 12.9, -2.25); sugon.castShadow = true; scene.add(sugon);
        
        const aifen = new THREE.Mesh(new THREE.BoxGeometry(1.6, 1.2, 1.6), aifenMats);
        aifen.position.set(11.0, 12.75, 4.0); aifen.rotation.y = -0.8; aifen.castShadow = true; scene.add(aifen);

        // --- ZONA PC ---
        createBox(2.2, 5.0, 4.5, matPC, -11.0, 10.15, -1.0); 
        createBox(1.8, 0.1, 1.2, matPC, -6.5, 7.7, -1.5); 
        createBox(0.3, 1.2, 0.2, matPC, -6.5, 8.3, -1.6); 
        createBox(5.0, 3.0, 0.3, matPC, -6.5, 9.8, -1.3); 
        createBox(4.8, 2.8, 0.31, matPantalla, -6.5, 9.8, -1.3); 
        createBox(4.0, 0.1, 1.2, matPC, -6.5, 7.7, 1.0); 

        // --- ZONA DE SOLDADURA ---
        createBox(6, 0.05, 4, matTapete, 2, 7.68, 1); 

        const microGrp = new THREE.Group();
        microGrp.position.set(2, 7.65, -0.5);
        scene.add(microGrp);
        const mBase = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.15, 2.0), matEstructura); mBase.castShadow = true; microGrp.add(mBase);
        const mCol = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.12, 2.5), matTirador); mCol.position.set(0, 1.25, -0.6); mCol.castShadow = true; microGrp.add(mCol);
        const mBrazo = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.25, 1.2), matEstructura); mBrazo.position.set(0, 2.0, 0); mBrazo.castShadow = true; microGrp.add(mBrazo);
        const mCabezal = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.3, 0.8), matEstructura); mCabezal.position.set(0, 1.6, 0.6); mCabezal.rotation.x = Math.PI/6; mCabezal.castShadow = true; microGrp.add(mCabezal);


        // =========================================================
        // === SISTEMA DE COTAS 3D (TIPO PLANO CAD) ===
        // =========================================================
        const cotasGroup = new THREE.Group();
        cotasGroup.visible = false; // Ocultas al iniciar
        scene.add(cotasGroup);

        // Función para dibujar una línea de cota con texto
        function crearCota3D(texto, x1, y1, z1, x2, y2, z2) {
            // 1. Dibujar la línea naranja
            const materialLinea = new THREE.LineBasicMaterial({ color: 0xfca311, linewidth: 2 });
            const puntos = [new THREE.Vector3(x1, y1, z1), new THREE.Vector3(x2, y2, z2)];
            const geometriaLinea = new THREE.BufferGeometry().setFromPoints(puntos);
            const linea = new THREE.Line(geometriaLinea, materialLinea);
            cotasGroup.add(linea);

            // 2. Bolitas en los extremos para marcar los topes
            const geoTope = new THREE.SphereGeometry(0.15, 8, 8);
            const matTope = new THREE.MeshBasicMaterial({ color: 0xfca311 });
            const tope1 = new THREE.Mesh(geoTope, matTope); tope1.position.set(x1, y1, z1);
            const tope2 = new THREE.Mesh(geoTope, matTope); tope2.position.set(x2, y2, z2);
            cotasGroup.add(tope1); cotasGroup.add(tope2);

            // 3. Crear el cartel de texto flotante
            const canvas = document.createElement('canvas');
            canvas.width = 256; canvas.height = 64;
            const ctx = canvas.getContext('2d');
            
            // Fondo oscuro semitransparente y borde naranja
            ctx.fillStyle = 'rgba(20, 20, 20, 0.8)'; 
            ctx.fillRect(0, 0, 256, 64);
            ctx.strokeStyle = '#fca311';
            ctx.lineWidth = 4;
            ctx.strokeRect(0, 0, 256, 64);
            
            // Texto blanco
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 36px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(texto, 128, 32);
            
            // Convertir canvas a Sprite 3D (depthTest: false hace que se vea por encima de la mesa)
            const textura = new THREE.CanvasTexture(canvas);
            const materialSprite = new THREE.SpriteMaterial({ map: textura, depthTest: false }); 
            const sprite = new THREE.Sprite(materialSprite);
            
            // Posicionar el texto en el centro de la línea, un poquito más arriba
            sprite.position.set((x1 + x2) / 2, ((y1 + y2) / 2) + 0.5, (z1 + z2) / 2);
            sprite.scale.set(3, 0.75, 1); // Ajustar proporciones del cartel
            
            cotasGroup.add(sprite);
        }

        // --- DIBUJAR LAS COTAS EXACTAS ---
        // Largo principal (flotando por el frente)
        crearCota3D('250 cm (Largo)', -12.5, 7.65, 5.0, 12.5, 7.65, 5.0);
        // Profundidad de la mesa izquierda
        crearCota3D('75 cm (Prof.)', -14.0, 7.65, -3.75, -14.0, 7.65, 3.75);
        // Largo de la parte L (desde el fondo)
        crearCota3D('150 cm (Largo L)', 14.0, 7.65, -3.75, 14.0, 7.65, 11.25);
        // Alto de la mesa (Desde el piso)
        crearCota3D('75 cm (Alto)', -13.5, 0.0, 3.5, -13.5, 7.65, 3.5);
        // Alto de la alzada superior
        crearCota3D('45 cm (Alzada)', 13.5, 7.65, 11.0, 13.5, 12.0, 11.0);
        // Ancho de los cajones
        crearCota3D('65 cm (Cajón)', -11.25, 6.0, 4.5, -4.75, 6.0, 4.5);


        // --- LÓGICA DEL BOTÓN ---
        const btnMedidas = document.getElementById('btnMedidas');
        btnMedidas.addEventListener('click', () => {
            cotasGroup.visible = !cotasGroup.visible; // Alternar visibilidad

            if (cotasGroup.visible) {
                btnMedidas.innerText = 'Ocultar Medidas 3D';
                btnMedidas.style.backgroundColor = '#fca311'; // Naranja
            } else {
                btnMedidas.innerText = 'Ver Medidas en 3D';
                btnMedidas.style.backgroundColor = '#4da6ff'; // Azul
            }
        });


        // Piso y Grid
        const piso = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), new THREE.MeshStandardMaterial({ color: 0x151515, roughness: 0.1 }));
        piso.rotation.x = -Math.PI / 2; piso.receiveShadow = true; scene.add(piso);
        const grid = new THREE.GridHelper(100, 100, 0x333333, 0x222222); grid.position.y = 0.01; scene.add(grid);

        // --- ANIMACIÓN ---
        function animate() { 
            requestAnimationFrame(animate); 
            controls.update(); 

            [cajonIzq, cajonCen, cajonL].forEach(cajon => {
                const targetPos = cajon.userData.isOpen ? cajon.userData.posAbierta : cajon.userData.posCerrada;
                cajon.position.lerp(targetPos, 0.1);
            });

            renderer.render(scene, camera); 
        }
        animate();

        window.addEventListener('resize', () => { 
            camera.aspect = window.innerWidth / window.innerHeight; 
            camera.updateProjectionMatrix(); 
            renderer.setSize(window.innerWidth, window.innerHeight); 
        });
    </script>
</body>
</html>
